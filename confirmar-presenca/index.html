<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar Presença — Ana &amp; Lucas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;1,400&family=Parisienne&family=Playfair+Display:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/forms.css?v=4" />
</head>
<body>
  <div class="wrap">
    <header class="page-head">
      <div class="page-head__script">Confirmar Presença</div>
      <p class="page-head__sub">Ana &amp; Lucas · 01 de Maio de 2026</p>
    </header>

    <div class="card" id="form-card">
      <div class="notice notice--error" id="form-notice" hidden></div>

      <form id="rsvp-form">
        <!-- 1) Nome -->
        <div class="field">
          <label class="field__label" for="nome">Nome Completo <span class="req">*</span></label>
          <input class="input" type="text" id="nome" name="nome" placeholder="Maria Silva" required />
        </div>

        <!-- 2) Telefone -->
        <div class="field">
          <label class="field__label" for="telefone">Telefone / WhatsApp <span class="req">*</span></label>
          <input class="input" type="tel" id="telefone" name="telefone" placeholder="(11) 91234-5678" required />
        </div>

        <!-- 3) Presença -->
        <div class="field">
          <span class="field__label">Você poderá comparecer ao nosso casamento? <span class="req">*</span></span>
          <div class="options">
            <label class="option">
              <input type="radio" name="presenca" value="Sim" required />
              <span>Sim, estarei presente</span>
            </label>
            <label class="option">
              <input type="radio" name="presenca" value="Não" />
              <span>Não poderei comparecer</span>
            </label>
          </div>
        </div>

        <!-- Bloco condicional: aparece só ao confirmar presença -->
        <div class="conditional" id="conditional" hidden>
          <!-- 4) Quantidade -->
          <div class="field" id="qtd-field">
            <span class="field__label">Quantidade de convidados <span class="req">*</span></span>
            <div class="options options--inline">
              <label class="option"><input type="radio" name="quantidade" value="1" /><span>1 (Apenas eu)</span></label>
              <label class="option"><input type="radio" name="quantidade" value="2" /><span>2 pessoas</span></label>
              <label class="option"><input type="radio" name="quantidade" value="3" /><span>3 pessoas</span></label>
              <label class="option"><input type="radio" name="quantidade" value="4" /><span>4 pessoas</span></label>
            </div>
          </div>

          <!-- 5) Restrição alimentar -->
          <div class="field">
            <label class="field__label" for="restricao">
              Possui alguma restrição alimentar? <span class="field__hint">(opcional)</span>
            </label>
            <textarea class="textarea" id="restricao" name="restricao" placeholder="Ex.: vegetariano, intolerância a lactose..."></textarea>
          </div>

          <!-- 6) Mensagem -->
          <div class="field">
            <label class="field__label" for="mensagem">
              Deixe uma mensagem para os noivos <span class="field__hint">(opcional)</span>
            </label>
            <textarea class="textarea" id="mensagem" name="mensagem" placeholder="Seu recado carinhoso..."></textarea>
          </div>
        </div>

        <button class="btn" type="submit" id="submit-btn">Confirmar</button>
      </form>
    </div>

    <p style="text-align:center"><a class="back-link" href="../">← Voltar ao convite</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/rsvp.js"></script>
</body>
</html>
